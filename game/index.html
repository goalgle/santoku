<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>산토쿠 · 전술</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #223; touch-action: none;
                 font-family: system-ui, -apple-system, sans-serif; }
    #hud { position: fixed; left: 10px; top: 10px; color: #dff; font-size: 12px; line-height: 1.6;
           pointer-events: none; text-shadow: 0 1px 2px #000; white-space: pre; }
    #ctrl { position: fixed; right: 12px; bottom: 12px; display: flex; gap: 8px; z-index: 10; }
    #ctrl button { width: 52px; height: 52px; font-size: 22px; border-radius: 10px; border: none;
                   background: rgba(0,0,0,.45); color: #dff; }
    #ctrl .lbl { align-self: center; color: #dff; font-size: 12px; text-shadow: 0 1px 2px #000; }
    #pausebtn { position: fixed; left: 12px; bottom: 12px; z-index: 10; height: 52px; padding: 0 16px;
                font-size: 15px; border-radius: 10px; border: none; background: rgba(0,0,0,.45); color: #dff; }
    #cmdbar { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 10;
              display: none; gap: 8px; }
    #cmdbar button { height: 52px; padding: 0 18px; font-size: 16px; border-radius: 10px; border: none;
                     background: rgba(0,0,0,.55); color: #dff; }
    #cmdbar button.on { background: #cc9a2a; color: #201400; }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="pausebtn">⏸ 명령</button>
  <div id="cmdbar">
    <button id="cmdMove">이동</button>
    <button id="cmdCharge">돌격</button>
    <button id="cmdDefend">방어</button>
    <button id="cmdCancel">취소</button>
  </div>
  <div id="ctrl">
    <span class="lbl">앵글</span>
    <button id="angleDown">−</button>
    <button id="angleUp">＋</button>
  </div>
  <script type="module" src="/src/web/main.ts"></script>
</body>
</html>
