<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>산토쿠 · 전술</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #223; touch-action: none;
                 font-family: system-ui, -apple-system, sans-serif; }
    #hud { position: fixed; left: 10px; top: 10px; color: #dff; font-size: 12px; line-height: 1.6;
           pointer-events: none; text-shadow: 0 1px 2px #000; white-space: pre; }
    #ctrl { position: fixed; right: 12px; bottom: 12px; display: flex; gap: 8px; z-index: 10; }
    #zoom { position: fixed; right: 12px; bottom: 74px; display: flex; gap: 8px; z-index: 10; }
    #ctrl button, #zoom button { width: 52px; height: 52px; font-size: 22px; border-radius: 10px; border: none;
                   background: rgba(0,0,0,.45); color: #dff; }
    #ctrl .lbl, #zoom .lbl { align-self: center; color: #dff; font-size: 12px; text-shadow: 0 1px 2px #000; }
    #pausebtn { position: fixed; left: 12px; bottom: 12px; z-index: 10; height: 52px; padding: 0 16px;
                font-size: 15px; border-radius: 10px; border: none; background: rgba(0,0,0,.45); color: #dff; }
    #generalbtn { position: fixed; left: 12px; bottom: 74px; z-index: 10; height: 52px; padding: 0 16px;
                  font-size: 15px; border-radius: 10px; border: none; background: rgba(0,0,0,.45); color: #dff; }
    #generalbtn:disabled { opacity: .4; }
    #generalbtn.out { background: rgba(180,60,60,.6); }
    #abilitybar { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 10;
                  display: flex; gap: 8px; }
    #abilitybar button { height: 56px; width: 74px; font-size: 13px; line-height: 1.3; border-radius: 10px;
                         border: none; color: #fff; background: rgba(0,0,0,.5); }
    #abilitybar button:disabled { opacity: .4; }
    #abilitybar button.active { outline: 3px solid #ffd24a; }
    /* ===== TEST ONLY (나중에 삭제) — 상대(B) 병종 on/off ===== */
    #testbar { position: fixed; left: 50%; top: 8px; transform: translateX(-50%); z-index: 20;
               display: flex; gap: 6px; align-items: center; padding: 4px 8px;
               background: rgba(0,0,0,.5); border: 1px dashed #888; border-radius: 8px; }
    #testbar .t { color: #f99; font-size: 11px; }
    #testbar button { height: 34px; min-width: 44px; font-size: 12px; border-radius: 6px; border: none;
                      background: rgba(120,120,120,.5); color: #fff; }
    #testbar button.on { background: rgba(80,170,90,.85); }
    #testbar button.off { background: rgba(170,70,70,.7); text-decoration: line-through; }
  </style>
</head>
<body>
  <div id="hud"></div>
  <!-- TEST ONLY (나중에 삭제) -->
  <div id="testbar">
    <span class="t">상대(B)</span>
    <button id="tShield" class="on" data-kind="shield">방패</button>
    <button id="tSpear" class="on" data-kind="spear">창</button>
    <button id="tBow" class="on" data-kind="bow">궁</button>
    <button id="tGeneral" class="on" data-kind="general">장수</button>
  </div>
  <button id="pausebtn">⏸ 명령</button>
  <button id="generalbtn">🗡 장수출전</button>
  <div id="abilitybar">
    <button id="abDefend">🛡<br>방어</button>
    <button id="abAdvance">⚔<br>공격</button>
    <button id="abVolley">🏹<br>일제사</button>
    <button id="abCharge">🐎<br>돌진</button>
  </div>
  <div id="zoom">
    <span class="lbl">줌</span>
    <button id="zoomOut">−</button>
    <button id="zoomIn">＋</button>
  </div>
  <div id="ctrl">
    <span class="lbl">앵글</span>
    <button id="angleDown">−</button>
    <button id="angleUp">＋</button>
  </div>
  <script type="module" src="/src/web/main.ts"></script>
</body>
</html>
